<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 fw-bold text-primary">Đăng nhập</h3>

                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label">Tài khoản</label>
                            <input type="text" class="form-control" formControlName="username"
                                [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" formControlName="password"
                                [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        </div>

                        <!-- Captcha Field -->
                        <div class="mb-3">
                            <label class="form-label">Xác nhận: <strong>{{ captchaNum1() }} + {{ captchaNum2() }} =
                                    ?</strong></label>
                            <div class="d-flex flex-wrap flex-sm-nowrap gap-2">
                                <input type="number" class="form-control" formControlName="captcha"
                                    placeholder="Nhập kết quả"
                                    [class.is-invalid]="loginForm.get('captcha')?.invalid && loginForm.get('captcha')?.touched">
                                <button type="button" class="btn btn-outline-secondary text-nowrap"
                                    (click)="generateCaptcha()" title="Đổi câu hỏi">
                                    <span class="material-symbols-outlined align-middle me-1">refresh</span> Đổi
                                </button>
                            </div>
                        </div>

                        @if (errorMsg()) {
                        <div class="alert alert-danger py-2 mb-3">
                            {{ errorMsg() }}
                        </div>
                        }

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2"
                            [disabled]="loginForm.invalid || isLoading()">
                            {{ isLoading() ? 'Đang xử lý...' : 'Đăng nhập' }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
