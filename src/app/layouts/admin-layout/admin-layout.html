<div class="d-flex" style="min-height: 100vh;">
    <!-- Sidebar -->
    <div class="bg-dark text-white p-3 d-flex flex-column gap-3" style="width: 250px;">
        <a class="text-white text-decoration-none fs-4 fw-bold d-flex align-items-center gap-2 mb-3"
            routerLink="/admin">
            <span class="material-symbols-outlined fs-3">admin_panel_settings</span>
            AdminCMS
        </a>

        <nav class="nav flex-column gap-2 px-2">
            <a class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded"
                routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                <span class="material-symbols-outlined fs-5">dashboard</span>
                Dashboard
            </a>
            <a class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded"
                routerLink="/admin/categories" routerLinkActive="active">
                <span class="material-symbols-outlined fs-5">category</span>
                Chuyên mục
            </a>
            <a class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded"
                routerLink="/admin/posts" routerLinkActive="active">
                <span class="material-symbols-outlined fs-5">article</span>
                Bài viết
            </a>
            <a class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded"
                routerLink="/admin/topics" routerLinkActive="active">
                <span class="material-symbols-outlined fs-5">topic</span>
                Chủ đề
            </a>
            <a class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded"
                routerLink="/admin/vocabularies" routerLinkActive="active">
                <span class="material-symbols-outlined fs-5">translate</span>
                Từ vựng
            </a>
            <a class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded"
                routerLink="/admin/users" routerLinkActive="active">
                <span class="material-symbols-outlined fs-5">group</span>
                Người dùng
            </a>
        </nav>

        <div class="mt-auto border-top border-secondary pt-3 px-2">
            <a routerLink="/" class="nav-link admin-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded">
                <span class="material-symbols-outlined fs-5">arrow_back</span>
                Về trang chủ
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 bg-light">
        <!-- Topbar -->
        <header class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold text-secondary">Quản trị hệ thống</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="material-symbols-outlined text-muted" role="button">notifications</span>
                <div class="vr"></div>

                <div class="dropdown">
                    <div class="d-flex align-items-center gap-2 cursor-pointer dropdown-toggle"
                        data-bs-toggle="dropdown" role="button" aria-expanded="false">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                            style="width: 32px; height: 32px;">
                            A
                        </div>
                        <span class="fw-bold text-dark">Admin</span>
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm mt-2">
                        <li>
                            <button class="dropdown-item d-flex align-items-center gap-2 text-danger"
                                (click)="authService.logout()">
                                <span class="material-symbols-outlined fs-5">logout</span>
                                Đăng xuất
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-4">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
